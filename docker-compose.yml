services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_thing
    network_mode: host
    command: ["postgres", "-c", "listen_addresses=127.0.0.1"]
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_thing"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
